version: "3.9"
services:
  postgres:
    image: postgres:16
    container_name: meeting-slot-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: meeting_slot_booking
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: meeting-slot-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  pgdata:
